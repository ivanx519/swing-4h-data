name: Aggiorna dati dashboard
on:
  schedule: [{cron: '17,47 * * * *'}]
  workflow_dispatch:
permissions: { contents: write }
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
      - env: { VPS_PASSWORD: "${{ secrets.VPS_PASSWORD }}" }
        run: |
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no \
            root@217.160.9.142:/opt/swing_bot/dashboard_data.json ./dashboard_data.json
          test -s dashboard_data.json
          git config user.name dashboard-bot
          git config user.email actions@users.noreply.github.com
          git add dashboard_data.json
          git commit -m "dati $(date -u +%FT%TZ)" || exit 0
          git push
